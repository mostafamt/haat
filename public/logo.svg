<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle with red-to-amber gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- Chicken drumstick -->
  <!-- Bone handle -->
  <rect x="38" y="38" width="6" height="18" rx="3" fill="white" opacity="0.95" transform="rotate(-45 41 47)"/>
  <!-- Meat part (rounded top) -->
  <ellipse cx="26" cy="24" rx="13" ry="12" fill="white" opacity="0.95"/>
  <!-- Grill marks -->
  <line x1="20" y1="20" x2="28" y2="20" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="25" x2="30" y2="25" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="30" x2="28" y2="30" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
</svg>
