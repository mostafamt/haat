<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>هات — ملصق الشنطة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: #e5e5e5;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 60px;
      padding: 60px 30px;
    }

    .label {
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      color: #666;
      margin-bottom: 14px;
      text-align: center;
      letter-spacing: 1px;
    }

    /* ─── STICKER WRAPPER ─── */
    .sticker {
      width: 300px;
      background: #ffffff;
      border-radius: 18px;
      padding: 32px 28px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    /* top color bar */
    .sticker::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 6px;
    }

    .sticker .logo-wrap {
      margin-bottom: 14px;
    }

    .sticker .logo-wrap img {
      width: 110px;
      height: 110px;
      object-fit: contain;
      display: block;
    }

    .sticker .brand-name {
      font-size: 72px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: 4px;
      margin-bottom: 6px;
    }

    .sticker .tagline {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 20px;
      letter-spacing: 0.5px;
    }

    /* divider */
    .sticker .divider {
      width: 80%;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .sticker .divider::before,
    .sticker .divider::after {
      content: '';
      flex: 1;
      height: 1.5px;
    }

    .sticker .divider span {
      font-size: 16px;
    }

    /* contacts */
    .sticker .contacts {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    .sticker .contact-row {
      display: flex;
      align-items: center;
      gap: 9px;
      direction: ltr;
    }

    .sticker .contact-row .icon {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .sticker .contact-row .icon svg {
      width: 14px;
      height: 14px;
    }

    .sticker .contact-row .number {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    /* ════════════════════════════════════
       OPTION A — white bg, red accents
       ════════════════════════════════════ */
    .sticker-a {
      box-shadow: 0 8px 32px rgba(220,38,38,0.18), 0 2px 8px rgba(0,0,0,0.08);
    }

    .sticker-a::before {
      background: #dc2626;
    }

    .sticker-a .brand-name {
      color: #dc2626;
    }

    .sticker-a .tagline {
      color: #1a1a1a;
    }

    .sticker-a .divider::before,
    .sticker-a .divider::after {
      background: #dc2626;
      opacity: 0.4;
    }

    .sticker-a .contact-row .number {
      color: #1a1a1a;
    }

    .sticker-a .contact-row .icon.phone-icon {
      background: #dc2626;
    }

    .sticker-a .contact-row .icon.whatsapp-icon {
      background: #16a34a;
    }

    /* ════════════════════════════════════
       OPTION B — white bg, dark accents
       ════════════════════════════════════ */
    .sticker-b {
      box-shadow: 0 8px 32px rgba(0,0,0,0.14), 0 2px 8px rgba(0,0,0,0.07);
    }

    .sticker-b::before {
      background: #1a1a1a;
    }

    .sticker-b .brand-name {
      color: #1a1a1a;
    }

    .sticker-b .tagline {
      color: #dc2626;
    }

    .sticker-b .divider::before,
    .sticker-b .divider::after {
      background: #1a1a1a;
      opacity: 0.25;
    }

    .sticker-b .contact-row .number {
      color: #1a1a1a;
    }

    .sticker-b .contact-row .icon.phone-icon {
      background: #1a1a1a;
    }

    .sticker-b .contact-row .icon.whatsapp-icon {
      background: #16a34a;
    }

    /* ─── PRINT ─── */
    @media print {
      body {
        background: white;
        padding: 20px;
        gap: 40px;
      }
      .label { display: none; }
      .sticker {
        page-break-inside: avoid;
        box-shadow: none;
      }
    }
  </style>
</head>
